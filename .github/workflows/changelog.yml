name: Auto Update Changelog

on:
  push:
    branches:
      - master
    paths:
      # 在这里维护需要追踪版本的脚本列表
      - 'FFA-Omnibar.js'
      # - 'FFA-NewScript.js'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # 防止 changelog 自动提交再次触发本 workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 拉取完整历史，确保 git log range 和 tag 查找正确工作
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect version bumps in JS files
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '*.js' 2>/dev/null || true)
          echo "Changed JS files: $CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No JS files changed, skipping."
            echo "bumped_files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          BUMPED_FILES=""

          for FILE in $CHANGED_FILES; do
            if [ ! -f "$FILE" ]; then continue; fi

            # 使用 grep + head 替代 sed BRE \+ 语法，避免跨平台兼容问题
            CUR=$(grep -m1 '// @version' "$FILE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^ ]*' | head -1)
            PREV=$(git show HEAD~1:"$FILE" 2>/dev/null | grep -m1 '// @version' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^ ]*' | head -1)

            echo "File: $FILE | prev: ${PREV:-<none>} | current: ${CUR:-<none>}"

            if [ -n "$CUR" ] && [ "$CUR" != "$PREV" ]; then
              BUMPED_FILES="$BUMPED_FILES,$FILE:$CUR:${PREV:-}"
            fi
          done

          BUMPED_FILES="${BUMPED_FILES#,}"
          echo "bumped_files=$BUMPED_FILES" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        if: steps.detect.outputs.bumped_files != ''
        env:
          BUMPED_FILES: ${{ steps.detect.outputs.bumped_files }}
        run: node .github/scripts/update-changelog.js

      - name: Commit and push CHANGELOG
        if: steps.detect.outputs.bumped_files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || \
            git commit -m "docs: update CHANGELOG for ${{ steps.detect.outputs.bumped_files }} [skip ci]"
          git push