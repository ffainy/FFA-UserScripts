name: Auto Update Changelog

on:
  push:
    branches:
      - master
    paths:
      # 在这里维护需要追踪版本的脚本列表
      - 'FFA-Omnibar.js'
      # - 'FFA-NewScript.js'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # 防止 changelog 自动提交再次触发本 workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 需要拉取完整历史用于版本对比
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect version bumps in JS files
        id: detect
        run: |
          # 获取推送范围内的所有commit
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          
          echo "Commit range: $BEFORE..$AFTER"

          # 收集所有发生版本变动的文件及完整版本链
          # 格式：file:newestVer:oldestVer:versionHistory，多个用逗号拼接
          # 其中 versionHistory 是所有中间版本用|分隔
          BUMPED_FILES=""
          declare -A FILE_FIRST_VER FILE_LAST_VER FILE_HISTORY

          # 遍历推送范围内的所有commit（从旧到新）
          for COMMIT in $(git rev-list "$AFTER".."$BEFORE" | tac); do
            # 获取该commit修改的所有JS文件
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "$COMMIT" -- '*.js')
            
            for FILE in $CHANGED_FILES; do
              if [ ! -f "$FILE" ]; then continue; fi
              
              # 获取当前commit的版本
              CUR=$(git show "$COMMIT":"$FILE" 2>/dev/null | sed -n 's|.*// @version[[:space:]]\+\([^[:space:]]\+\).*|\1|p' | head -1)
              
              echo "Commit: $COMMIT | File: $FILE | version: $CUR"
              
              # 只记录有版本标记的文件
              if [ -n "$CUR" ]; then
                # 初始化第一个版本
                if [ -z "${FILE_FIRST_VER[$FILE]}" ]; then
                  FILE_FIRST_VER["$FILE"]="$CUR"
                fi
                # 持续更新最后版本
                FILE_LAST_VER["$FILE"]="$CUR"
                # 添加到历史记录
                if [ -z "${FILE_HISTORY[$FILE]}" ]; then
                  FILE_HISTORY["$FILE"]="$CUR"
                else
                  # 去重：避免同版本重复
                  LAST_IN_HISTORY=$(echo "${FILE_HISTORY[$FILE]}" | sed 's/.*|//')
                  if [ "$LAST_IN_HISTORY" != "$CUR" ]; then
                    FILE_HISTORY["$FILE"]="${FILE_HISTORY[$FILE]}|$CUR"
                  fi
                fi
              fi
            done
          done

          # 将记录转换为格式：file:newestVer:oldestVer:versionHistory
          for FILE in "${!FILE_LAST_VER[@]}"; do
            NEWEST="${FILE_LAST_VER[$FILE]}"
            OLDEST="${FILE_FIRST_VER[$FILE]}"
            HISTORY="${FILE_HISTORY[$FILE]}"
            BUMPED_FILES="$BUMPED_FILES,$FILE:$NEWEST:$OLDEST:$HISTORY"
          done

          # 去掉开头多余的逗号
          BUMPED_FILES="${BUMPED_FILES#,}"
          echo "bumped_files=$BUMPED_FILES" >> $GITHUB_OUTPUT
          echo "Result: $BUMPED_FILES"

      - name: Update CHANGELOG.md
        if: steps.detect.outputs.bumped_files != ''
        env:
          BUMPED_FILES: ${{ steps.detect.outputs.bumped_files }}
        run: node .github/scripts/update-changelog.js

      - name: Commit and push CHANGELOG
        if: steps.detect.outputs.bumped_files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || \
            git commit -m "docs: update CHANGELOG for ${{ steps.detect.outputs.bumped_files }} [skip ci]"
          git push