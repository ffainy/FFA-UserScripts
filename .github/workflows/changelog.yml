name: Auto Update Changelog

on:
  push:
    branches:
      - master
    # 仅在这些文件变动时触发，减少不必要的运行
    paths:
      - 'apple.js'
      - 'banana.js'
      # - 'NewScript.js'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # 统一定义监控目标
    env:
      TARGET_SCRIPTS: "apple.js banana.js"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整历史以支持版本回溯

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Changelog Entries
        id: changelog_step # 设置 ID 以便后续引用输出
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          # 初始推送/强推兼容性修正
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE_SHA" ]; then
            export BEFORE_SHA=$(git rev-parse HEAD~1)
          fi
          node .github/scripts/update-changelog.js

      - name: Commit and Push Changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          
          # 1. 获取 JS 脚本传出的更新列表
          # 2. 如果列表为空，则使用默认 fallback
          RAW_LIST="${{ steps.changelog_step.outputs.updated_list }}"
          UPDATED_LIST=${RAW_LIST:-"scripts"}
          
          # 生成你要求的格式: docs: update CHANGELOG for apple.js | banana.js [skip ci]
          COMMIT_MSG="docs: update CHANGELOG for $UPDATED_LIST [skip ci]"

          if ! git diff --cached --quiet; then
            # 使用 rebase 避免推送冲突
            git pull origin master --rebase --autostash
            git commit -m "$COMMIT_MSG"
            git push origin master
          else
            echo "没有检测到 CHANGELOG.md 变动，跳过推送。"
          fi